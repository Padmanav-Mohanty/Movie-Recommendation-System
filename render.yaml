services:
  - type: web
    name: movie-recommender-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: PORT
        value: 8000
      - key: ENV
        value: production
      - key: DEFAULT_MODEL
        value: svd
      - key: WEB_CONCURRENCY
        value: 1
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: MODEL_ARTIFACT_BASE_URL
        sync: false
      - key: MODEL_ARTIFACTS
        value: svd_model.pkl
    healthCheckPath: /health
    autoDeploy: true