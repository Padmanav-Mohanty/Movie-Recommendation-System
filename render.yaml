services:
  - type: web
    name: movie-recommender-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: ENV
        value: production
      - key: DEFAULT_MODEL
        value: svd
      - key: ALLOWED_ORIGINS
        value: "*"
    healthCheckPath: /health
    autoDeploy: true